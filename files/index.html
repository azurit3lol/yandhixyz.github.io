<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Files - yandhi.xyz</title>

<link rel="icon" href="../favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Yantramanav:wght@400;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Yantramanav',sans-serif;
background:#ffffff;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:40px 20px;
}

.container{
max-width:900px;
width:100%;
}

.hero{
width:100%;
max-width:650px;
margin:40px auto;
display:block;
}

.title{
font-size:70px;
font-weight:900;
color:#b297be;
margin-bottom:10px;
}

.description{
font-size:18px;
margin-bottom:40px;
}

.navbar{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:14px;
margin-bottom:40px;
}

.nav-btn{
width:130px;
height:55px;
background-image:url("https://files.strawcdn.com/straw/TSIVdGRJYHbTKFYiFXQG.png");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
text-decoration:none;
color:black;
}

.nav-btn.active{
background-image:url("https://files.strawcdn.com/straw/BVlqgCZFdsxtKGdkPqpp.png");
}

.donate{
width:130px;
height:55px;
background-image:url("https://files.strawcdn.com/straw/IWZFmfxLplPNnrbNUvOO.png");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
text-decoration:none;
color:black;
}

.section{
margin-top:40px;
font-size:18px;
line-height:1.6;
}

ul{
margin-top:15px;
text-align:left;
display:inline-block;
}

li{
margin-bottom:10px;
}

@media (max-width:700px){

.hero{
max-width:95%;
}

.nav-btn{
width:110px;
height:50px;
font-size:14px;
}

.donate{
width:140px;
height:60px;
}

}

</style>

</head>

<body>

<div class="container">

<img class="hero" src="https://files.strawcdn.com/straw/sCrFzFZpvoCJybMckdAT.png">

<h1 class="title">yandhi.xyz</h1>

<p class="description">
A platform for audio downloads! Explore hundreds of files uploaded by our community.
</p>

<div class="navbar">

<a href="../" class="nav-btn active">Home</a>
<a href="../files" class="nav-btn">Files</a>
<a href="../upload" class="nav-btn">Upload</a>
<a href="../faq" class="nav-btn">FAQ</a>
<a href="../rules" class="nav-btn">Rules</a>
<a href="../donate" class="donate">Donate</a>
<a href="../contact" class="nav-btn">Contact</a>

</div>

<h2>Index of files</h2>

<table id="list">
<thead>
<tr>
<th style="width:55%">Name</th>
<th style="width:20%">Size</th>
<th style="width:25%">Date</th>
<th style="width:25%">Comment</th>
</tr>
</thead>

<tbody id="fileTable"></tbody>

</table>

</div>

<script>
fetch("filelist.json")
.then(res => res.json())
.then(files => {

const table = document.getElementById("fileTable");

files.forEach(file => {

let row = document.createElement("tr");

let nameCell = document.createElement("td");
let link = document.createElement("a");
link.href = file.name;
link.textContent = file.name;
nameCell.appendChild(link);

let sizeCell = document.createElement("td");
sizeCell.textContent = file.size;

let dateCell = document.createElement("td");
dateCell.textContent = file.date;

let commentCell = document.createElement("td");
commentCell.textContent = file.comment || "";

row.appendChild(nameCell);
row.appendChild(sizeCell);
row.appendChild(dateCell);
row.appendChild(commentCell);

table.appendChild(row);

});

});
</script>

</body>
</html>
